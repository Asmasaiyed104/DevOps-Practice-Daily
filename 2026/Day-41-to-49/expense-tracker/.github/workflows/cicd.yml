#
name: CI/CD practice-1
on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out my code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.15"

      - name: Install dependencies
        working-directory: 2026/Day-41-to-49/expense-tracker
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: 2026/Day-41-to-49/expense-tracker
        run: pytest tests/ -v
