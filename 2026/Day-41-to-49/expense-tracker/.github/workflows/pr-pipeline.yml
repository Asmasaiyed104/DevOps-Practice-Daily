name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'

permissions:
  contents: read
  pull-requests: read

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      run_tests: true

  # Day 49 - check any new dependencies added in this PR for known CVEs.
  # Only works on pull_request events, since it needs a before/after diff.
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  pr-summary:
    needs: [build-test, dependency-review]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Print summary banner
        uses: ./.github/actions/print-banner
        with:
          message: "PR checks passed for branch: ${{ github.head_ref }}"
          status: "ok"

  # Day 47 - reacts only when a PR is actually merged, not just closed.
  on-merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Print merge info
        run: |
          echo "PR '${{ github.event.pull_request.title }}' by ${{ github.event.pull_request.user.login }} was merged into ${{ github.event.pull_request.base.ref }}"
