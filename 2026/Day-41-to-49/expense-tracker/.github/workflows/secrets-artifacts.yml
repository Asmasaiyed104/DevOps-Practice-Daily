name: Secrets and Artifacts

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-and-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Task 1 & 2 - confirm a secret exists without ever printing it.
      # Create a repo secret called APP_SECRET_MESSAGE first
      # (Settings -> Secrets and variables -> Actions) for this to show true.
      - name: Confirm secret is set (safe way)
        env:
          SECRET_IS_SET: ${{ secrets.APP_SECRET_MESSAGE != '' }}
        run: |
          echo "The secret is set: $SECRET_IS_SET"

      # Task 3 & 4 - generate a real file and upload it as an artifact.
      - name: Run the tracker and save output as a report
        run: |
          mkdir -p output
          python main.py > output/tracker-report.txt
          echo "Generated at: $(date -u)" >> output/tracker-report.txt
          echo "Commit: ${{ github.sha }}" >> output/tracker-report.txt

      - name: Run tests and save results as a report
        run: |
          pytest tests/ -v > output/test-report.txt || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-reports
          path: output/
          retention-days: 7

  use-artifact:
    runs-on: ubuntu-latest
    needs: secrets-and-artifacts
    steps:
      - name: Download artifact from previous job
        uses: actions/download-artifact@v4
        with:
          name: expense-tracker-reports
          path: downloaded

      - name: Print the downloaded reports
        run: |
          echo "----- Tracker report -----"
          cat downloaded/tracker-report.txt
          echo "----- Test report -----"
          cat downloaded/test-report.txt
