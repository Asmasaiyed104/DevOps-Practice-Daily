name: Reusable Docker Build, Push and Test

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name"
        type: string
        required: true

      tag:
        description: "Docker image tag"
        type: string
        required: true

    secrets:
      docker_username:
        required: true

      docker_token:
        required: true

    outputs:
      image_url:
        description: "Full pushed image reference"
        value: ${{ jobs.docker.outputs.url }}

permissions:
  contents: read

env:
  APP_DIR: 2026/Day-41-to-49/expense-tracker

jobs:
  docker:
    name: Docker
    runs-on: ubuntu-latest

    outputs:
      url: ${{ steps.set_url.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}" \
            "${{ env.APP_DIR }}"

      - name: Smoke-test the built image
        run: |
          output=$(docker run --rm \
            "${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}")

          echo "$output"

          echo "$output" | grep -q "Total spent" || {
            echo "Expected output not found"
            exit 1
          }

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Push Docker image
        run: |
          docker push \
            "${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Set image URL output
        id: set_url
        run: |
          echo "url=docker.io/${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}" \
            >> "$GITHUB_OUTPUT"
