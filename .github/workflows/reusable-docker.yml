name: Reusable Docker Build, Push and Test

on:
  workflow_call:
    inputs:
      image_name:
        type: string
        required: true
      tag:
        type: string
        required: true
    secrets:
      docker_username:
        required: true
      docker_token:
        required: true
    outputs:
      image_url:
        description: "Full pushed image reference"
        value: ${{ jobs.docker.outputs.url }}

permissions:
  contents: read

env:
  APP_DIR: 2026/Day-41-to-49/expense-tracker

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.set_url.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The Dockerfile lives inside the app folder, not the repo root, so the
      # build context has to point there too, not "."
      - name: Build Docker image
        run: docker build -t ${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }} ${{ env.APP_DIR }}

      - name: Smoke-test the built image
        run: |
          output=$(docker run --rm ${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }})
          echo "$output"
          echo "$output" | grep -q "Total spent" || (echo "Expected output not found" && exit 1)

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}
          format: table
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Push Docker image
        run: docker push ${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}

      - name: Set image URL output
        id: set_url
        run: echo "url=docker.io/${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
