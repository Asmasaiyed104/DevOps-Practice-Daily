name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"

permissions:
  contents: read
  pull-requests: read

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      run_tests: true

  pr-summary:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print summary banner
        uses: ./.github/actions/print-banner
        with:
          message: "PR checks passed for branch: ${{ github.head_ref }}"
          status: "ok"

  on-merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Print merge info
        run: |
          echo "PR '${{ github.event.pull_request.title }}' by ${{ github.event.pull_request.user.login }} was merged into ${{ github.event.pull_request.base.ref }}"
